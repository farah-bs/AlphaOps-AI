# ══════════════════════════════════════════════════════════════════════════════
# AlphaOps AI — Overrides production
# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Ce fichier :
#   - Ajoute Nginx (reverse proxy SSL) + Certbot (renouvellement auto)
#   - Lie les ports Postgres à 127.0.0.1 uniquement (pas accessibles depuis internet)
#   - Supprime l'exposition directe des ports applicatifs (tout passe par Nginx)
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Reverse proxy SSL ────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - webapp
      - serving
      - airflow_webserver
      - mlflow
    restart: unless-stopped
    networks:
      - default

  # ── Renouvellement automatique SSL (Let's Encrypt) ───────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Vérifie le renouvellement toutes les 12h (certbot ne renouvelle que si < 30j restants)
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    restart: unless-stopped

  # ── Postgres : accès localhost uniquement (pas d'exposition internet) ─────────
  postgres_data:
    ports:
      - "127.0.0.1:5433:5432"

  postgres_airflow:
    ports:
      - "127.0.0.1:5434:5432"

  # ── Services applicatifs : plus de port hôte exposé (accès via Nginx seulement)
  mlflow:
    ports: []

  airflow_webserver:
    ports: []

  serving:
    ports: []

  webapp:
    ports: []

# ── Volumes supplémentaires ───────────────────────────────────────────────────
volumes:
  certbot_www:
  certbot_conf:
  nginx_logs:
