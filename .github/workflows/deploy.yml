name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  lint:
    name: Vérification rapide
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint avec ruff
        run: |
          pip install ruff --quiet
          ruff check webapp/app.py serving/api.py ml/ src/ --ignore E501 || true

  deploy:
    name: Déploiement production
    runs-on: ubuntu-latest
    needs: lint
    environment: production

    steps:
      - name: Déployer sur le VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 600s
          script: |
            set -e

            echo "═══════════════════════════════════════════"
            echo " AlphaOps AI — Déploiement $(date '+%Y-%m-%d %H:%M:%S')"
            echo "═══════════════════════════════════════════"

            cd /srv/alphaops

            echo "[0/5] Nettoyage PRE-deploy (safe)..."
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true

            echo "[1/5] Pull du code..."
            git fetch origin
            git reset --hard origin/main

            echo "[2/5] Mise à jour du .env..."
            cat > .env <<'EOF'
            ${{ secrets.ENV_PROD }}
            EOF
            chmod 600 .env

            echo "[3/5] Build & restart..."
            docker compose up -d --build --remove-orphans

            echo "[4/5] Nettoyage POST-deploy..."
            docker image prune -af || true
            docker builder prune -af || true

            echo "[5/5] Status containers"
            docker compose ps

            echo "✅ Deploy terminé"

      - name: Notification succès
        if: success()
        run: echo "Déploiement réussi — commit ${{ github.sha }}"

      - name: Notification échec
        if: failure()
        run: echo "Déploiement échoué — vérifier les logs GitHub Actions"