name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  lint:
    name: Vérification rapide
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint avec ruff
        run: |
          pip install ruff --quiet
          ruff check webapp/app.py serving/api.py ml/ src/ --ignore E501 || true

  deploy:
    name: Déploiement production
    runs-on: ubuntu-latest
    needs: lint
    environment: production

    steps:
      - name: Déployer sur le VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 300s
          script: |
            set -e

            echo "═══════════════════════════════════════════"
            echo " AlphaOps AI — Déploiement $(date '+%Y-%m-%d %H:%M:%S')"
            echo "═══════════════════════════════════════════"

            cd /srv/alphaops

            echo "[1/4] Pull du code..."
            git fetch origin
            git reset --hard origin/main

            echo "[2/4] Mise à jour du .env..."
            cat > .env <<'EOF'
            ${{ secrets.ENV_PROD }}
            EOF
            chmod 600 .env

            echo "[3/4] Rebuild et redémarrage..."
            docker compose up -d --build --remove-orphans

            echo "[4/4] Nettoyage..."
            docker image prune -f

            echo ""
            echo "Déploiement terminé avec succès !"
            docker compose ps

      - name: Notification succès
        if: success()
        run: echo "Déploiement réussi — commit ${{ github.sha }}"

      - name: Notification échec
        if: failure()
        run: echo "Déploiement échoué — vérifier les logs GitHub Actions"