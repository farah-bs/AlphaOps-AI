name: alphaops_ai

services:
  postgres_data:
    image: postgres:15
    container_name: postgres_data
    restart: always
    environment:
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_DB=${PGDATABASE}
    ports:
      - "5433:5432"
    volumes:
      - pgdata_financial:/var/lib/postgresql/data
      - ./data/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${PGUSER}", "-d", "${PGDATABASE}"]
      interval: 5s
      retries: 10

  postgres_airflow:
    image: postgres:15
    container_name: postgres_airflow
    restart: always
    environment:
      - POSTGRES_USER=${AIRFLOW_PGUSER}
      - POSTGRES_PASSWORD=${AIRFLOW_PGPASSWORD}
      - POSTGRES_DB=${AIRFLOW_PGDATABASE}
    ports:
      - "5434:5432"
    volumes:
      - pgdata_airflow:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_PGUSER}", "-d", "${AIRFLOW_PGDATABASE}"]
      interval: 5s
      retries: 10

  airflow_init:
    build: .
    container_name: airflow_init
    depends_on:
      postgres_airflow:
        condition: service_healthy
      postgres_data:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_PGUSER}:${AIRFLOW_PGPASSWORD}@postgres_airflow:5432/${AIRFLOW_PGDATABASE}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      PYTHONPATH: /opt/airflow
      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT}
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@local || true
      "

  airflow_webserver:
    build: .
    container_name: airflow_webserver
    restart: unless-stopped
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_PGUSER}:${AIRFLOW_PGPASSWORD}@postgres_airflow:5432/${AIRFLOW_PGDATABASE}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      PYTHONPATH: /opt/airflow

      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT}
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    ports:
      - "8081:8080"
    command: >
      bash -c "
      airflow webserver
      "

  airflow_scheduler:
    build: .
    container_name: airflow_scheduler
    restart: unless-stopped
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_PGUSER}:${AIRFLOW_PGPASSWORD}@postgres_airflow:5432/${AIRFLOW_PGDATABASE}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      PYTHONPATH: /opt/airflow

      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT}
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    command: >
      bash -c "
      airflow scheduler
      "

  streamlit:
    image: python:3.11-slim
  # ─── Serving API ──────────────────────────────────────────────────────────────

  serving:
    build:
      context: .
      dockerfile: serving/Dockerfile
    container_name: serving
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HMAC_SECRET=${HMAC_SECRET}
      - RETRAIN_K=${RETRAIN_K:-20}
    ports:
      - "8082:8080"
    volumes:
      - ./data:/data
      - ./artifacts:/artifacts

  # ─── Webapp Streamlit ─────────────────────────────────────────────────────────

  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    container_name: webapp
    working_dir: /app
    depends_on:
      postgres_data:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./webapp:/app
      - ./src:/app/src
    command: >
      bash -c "
      pip install --no-cache-dir -r requirements.txt &&
      streamlit run app.py --server.port 8501 --server.address=0.0.0.0
      "

  # ─── LangChain Email Agent ───────────────────────────────────────────────────

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - FEEDBACK_BASE_URL=http://localhost:8082
      - HMAC_SECRET=${HMAC_SECRET:-alphaops-secret-change-me}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    ports:
      - "8083:8083"

volumes:
  pgdata_financial:
  pgdata_airflow: