name: alphaops_ai

services:

  # ─── Bases de données ────────────────────────────────────────────────────────

  postgres_data:
    image: postgres:15
    container_name: postgres_data
    restart: always
    environment:
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_DB=${PGDATABASE}
    ports:
      - "5433:5432"
    volumes:
      - pgdata_financial:/var/lib/postgresql/data
      - ./data/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${PGUSER}", "-d", "${PGDATABASE}"]
      interval: 5s
      retries: 10

  postgres_airflow:
    image: postgres:15
    container_name: postgres_airflow
    restart: always
    environment:
      - POSTGRES_USER=${AIRFLOW_PGUSER}
      - POSTGRES_PASSWORD=${AIRFLOW_PGPASSWORD}
      - POSTGRES_DB=${AIRFLOW_PGDATABASE}
    ports:
      - "5434:5432"
    volumes:
      - pgdata_airflow:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_PGUSER}", "-d", "${AIRFLOW_PGDATABASE}"]
      interval: 5s
      retries: 10

  # ─── MLflow Tracking Server ───────────────────────────────────────────────────

  mlflow:
    build:
      context: .
      dockerfile: mlflow/Dockerfile
    container_name: mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns

  # ─── Airflow ──────────────────────────────────────────────────────────────────

  airflow_init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow_init
    depends_on:
      postgres_airflow:
        condition: service_healthy
      postgres_data:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_PGUSER}:${AIRFLOW_PGPASSWORD}@postgres_airflow:5432/${AIRFLOW_PGDATABASE}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      PYTHONPATH: /opt/airflow
      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT}
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./ml:/opt/airflow/ml
      - ./artifacts:/opt/airflow/artifacts
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@local || true
      "

  airflow_webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow_webserver
    restart: unless-stopped
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_PGUSER}:${AIRFLOW_PGPASSWORD}@postgres_airflow:5432/${AIRFLOW_PGDATABASE}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      PYTHONPATH: /opt/airflow
      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT}
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./ml:/opt/airflow/ml
      - ./artifacts:/opt/airflow/artifacts
    ports:
      - "8081:8080"
    command: airflow webserver

  airflow_scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow_scheduler
    restart: unless-stopped
    depends_on:
      airflow_init:
        condition: service_completed_successfully
      mlflow:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_PGUSER}:${AIRFLOW_PGPASSWORD}@postgres_airflow:5432/${AIRFLOW_PGDATABASE}
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      PYTHONPATH: /opt/airflow
      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT}
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./ml:/opt/airflow/ml
      - ./artifacts:/opt/airflow/artifacts
    command: airflow scheduler

  # ─── Serving API ──────────────────────────────────────────────────────────────

  serving:
    build:
      context: .
      dockerfile: serving/Dockerfile
    container_name: serving
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8082:8080"
    volumes:
      - ./data:/data
      - ./artifacts:/artifacts

  # ─── Webapp Streamlit ─────────────────────────────────────────────────────────

  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    container_name: webapp
    restart: unless-stopped
    depends_on:
      postgres_data:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PGHOST=postgres_data
      - PGPORT=5432
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./webapp/app.py:/app/app.py
      - ./ml:/app/ml
      - ./artifacts:/artifacts
      - ./artifacts:/app/artifacts
    ports:
      - "8501:8501"

volumes:
  pgdata_financial:
  pgdata_airflow:
