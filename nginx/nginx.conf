# ══════════════════════════════════════════════════════════════════════════════
# AlphaOps AI — Configuration Nginx (reverse proxy + SSL)
# ══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logs ─────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Sécurité de base ──────────────────────────────────────────────────────
    server_tokens off;                    # Masquer la version Nginx
    client_max_body_size 20m;
    keepalive_timeout 65;
    sendfile on;

    # ── Rate limiting (anti-abus / DDoS léger) ────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m    rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=webapp:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ── Upstream services (réseau Docker interne) ─────────────────────────────
    upstream streamlit  { server webapp:8501; }
    upstream fastapi    { server serving:8080; }
    upstream airflow    { server airflow_webserver:8080; }
    upstream mlflow_srv { server mlflow:5000; }

    # ══════════════════════════════════════════════════════════════════════════
    # Redirection HTTP → HTTPS
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name _;

        # Validation Let's Encrypt (certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # HTTPS — Application principale (Streamlit)
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        http2 on;
        server_name VOTRE_DOMAINE;          # ← remplacer par votre domaine

        # ── Certificats SSL (Let's Encrypt via certbot) ───────────────────────
        ssl_certificate     /etc/letsencrypt/live/VOTRE_DOMAINE/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/VOTRE_DOMAINE/privkey.pem;

        # ── Paramètres SSL sécurisés ──────────────────────────────────────────
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        # ── En-têtes de sécurité HTTP ─────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           SAMEORIGIN                             always;
        add_header X-Content-Type-Options    nosniff                                always;
        add_header X-XSS-Protection          "1; mode=block"                        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
        add_header Permissions-Policy        "geolocation=(), microphone=()"        always;

        # ── Streamlit (WebSocket obligatoire) ─────────────────────────────────
        location / {
            limit_req  zone=webapp burst=50 nodelay;
            limit_conn conn 20;

            proxy_pass http://streamlit;

            # WebSocket support (Streamlit l'exige)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            proxy_read_timeout    86400;   # Garder les connexions WS longues
            proxy_connect_timeout 60s;
        }

        # ── FastAPI Serving (rate limiting strict) ────────────────────────────
        location /api/ {
            limit_req  zone=api burst=10 nodelay;
            limit_conn conn 10;

            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://fastapi;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
        }

        # ── Airflow UI (protégé par mot de passe) ─────────────────────────────
        location /airflow/ {
            auth_basic           "AlphaOps — Accès restreint";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://airflow/;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── MLflow UI (protégé par mot de passe) ──────────────────────────────
        location /mlflow/ {
            auth_basic           "AlphaOps — Accès restreint";
            auth_basic_user_file /etc/nginx/.htpasswd;

            rewrite ^/mlflow/(.*) /$1 break;
            proxy_pass http://mlflow_srv;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Bloquer fichiers sensibles ────────────────────────────────────────
        location ~ /\.(env|git|htpasswd) {
            deny all;
            return 404;
        }
    }
}
